name: Publish Node.js SDK to npm

# 当推送带有 'v' 前缀的 Tag (如 v0.2.0) 时触发发布
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # 这个配置是告诉 npm 认证信息从 NODE_AUTH_TOKEN 环境变量读取
          registry-url: 'https://registry.npmjs.org'

      - name: 3. Install dependencies
        run: npm ci

      - name: 4. Compile TypeScript (Build)
        run: npm run build

      - name: 5. Publish to npm
        run: npm publish --access public
        env:
          # NODE_AUTH_TOKEN 是 setup-node 内置约定的变量名
          # 需要你在 GitHub 仓库的 Secrets 中配置一个 NPM_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
